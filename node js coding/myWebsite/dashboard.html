<!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
            * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: white;
    }

    
    .navbar {
      background: black;
      color: white;
      padding: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .navbar h2 {
      font-size: 50px;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .navbar ul li a {
      color: black;
      text-decoration: none;
      font-size: 14px;
    }

    .navbar ul li a:hover {
      text-decoration: underline;
    }
    .h2{
        text-align: center;
        
    }

    </style>
</head>
<body>
    <div class="navbar">
    <h2>Dashboard</h2>
    <ul>
        <li><a href="#">Dasboard</a></li>
      <li><a href="#">Home</a></li>
      <li><a href="#">Profile</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </div>
  <h2>welcome to my website </h2>
</body>
</html>
